name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y build-essential meson nasm libfreetype6-dev libfribidi-dev libharfbuzz-dev libfontconfig-dev

      - name: Build
        run: |
          ./rebuild -j$(nproc)
          mkdir dist
          DESTDIR="$(pwd)/dist" ./install

      - uses: actions/upload-artifact@v7
        with:
          name: mpv-build
          path: dist/usr/local
  
  release:
    runs-on: ubuntu-latest
    needs: build
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mpv-build

      - name: Prepare artifacts
        run: tar -czvf mpv-build.tar.gz mpv-build/*
      
      - name: Create git tag
        id: create-git-tag
        run: |
          tag="autobuild-$(date -u '+%Y-%m-%d-%H-%M')"
          git tag $tag
          git push origin $tag
          echo "TAG=$tag" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.create-git-tag.outputs.TAG }} mpv-build.tar.gz \
            -n "{{ steps.create-git-tag.outputs.TAG }}"
